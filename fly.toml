app = 'emf-beer'
primary_region = 'lhr'

# [env]
#   PUBLIC_IP_ADDRESS = '1.1.1.1'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[services]]
  protocol = 'udp'
  internal_port = 5080

  [[services.ports]]
    port = 5080

[[services]]
  protocol = 'udp'
  internal_port = 4000

  [[services.ports]]
    port = 4000

[[services]]
  protocol = 'udp'
  internal_port = 4001

  [[services.ports]]
    port = 4001

[[services]]
  protocol = 'udp'
  internal_port = 4002

  [[services.ports]]
    port = 4002

[[services]]
  protocol = 'udp'
  internal_port = 4003

  [[services.ports]]
    port = 4003

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
